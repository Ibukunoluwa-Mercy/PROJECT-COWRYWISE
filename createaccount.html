<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Cowrywise</title>
    <link rel="shortcut icon" href="IMAGES/Logo.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Onest", sans-serif;
        }

        body {
            background-color: #f4f7fa;
        }

        .image {
            padding: 50px;
            margin-top: 30px;
        }

        .container-1 {
            display: flex;
            gap: 10px;
        }

        .card {
            padding: 0px 70px;
            border-radius: 15px;
            border: none;
        }

        .cards-1 {
            justify-content: space-between;
            align-items: center;
        }

        .cards-2 {
            justify-content: space-between;
            align-items: center;
            padding: 0px 70px;
        }

        .cards-2 h5 {
            color: #0a2e65;
            font-size: 24px;
            font-weight: 600;
        }

        .cards-2 p {
            color: #6c84a8;
            font-size: 16px;
            font-weight: 400;
            width: 100%;
            ;
        }

        .cards-1 h3 {
            color: #0a2e65;
            font-size: 64px;
            font-weight: 600;
            margin-top: 20px;
            width: 50%;
        }

        .cards-1 span {
            color: #adbacd;
            font-size: 14px;
            font-weight: 600;
            margin-top: 15px;
        }

        .cards-1 span a {
            text-decoration: none;
            color: #0066f5;
            font-size: 14px;
            font-weight: 600;
            opacity: 0.8;
            margin-top: 10px;
        }

        .grids {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .social button {
            background: white;
            border: 1px solid #e0e0e0;
            padding: 10px 4px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #49648d;
            font-weight: 600;
            font-weight: 16px;
            margin-top: 20px;
        }


        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            margin: 16px 0;
        }

        .divider hr {
            width: 50%;
            opacity: 0.1;
        }

        .input-type {
            margin-bottom: 15px;
            position: relative;
        }

        .input-type input {
            width: 100%;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 400;
            opacity: 0.8;
        }

        .input-type .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #49648d;
            opacity: 0.8;
        }

        .btn {
            width: 100%;
        }

        .btn button {
            padding: 15px;
            width: 100%;
            background-color: #0066f5;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px;
        }

        .footer-links {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 13px;
            width: 62%;
        }

        .footer-links a {
            color: #0066f5;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            opacity: 0.9;
        }

        .cards-2 a {
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 50px;
            padding: 3px;
            background-color: #ffffff;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1),
                0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .bg-image {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 50%;
            max-width: 770px;
            z-index: 1;
            pointer-events: none;
        }

        .img-logo img {
            border-radius: 50%;
            padding: 15px;
            background-color: #0066f5;
        }

        @media screen and (max-width: 768px) {
            .container-1 {
                flex-direction: column;
                gap: 20px;
            }

            .bg-image img {
                display: none;
            }

            .img-logo {
                display: none;
            }

            .cards-1 h3 {
                font-size: 20px;
                width: 100%;
            }

            .cards-2 h5 {
                font-size: 18px;
            }

            .input-type {
                width: 100%;
            }

            .cards-2 p {
                font-size: 14px;
                width: 100%;
            }

            .btn button {
                padding: 15px 60px;
                width: 100%;
            }

            .footer-links {
                align-items: center;
                justify-content: center;
                display: grid;
                width: 100%;
                margin-bottom: 20px;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="image">
            <a href="index.html"><img src="IMAGES/original-logo.svg" alt=""></a>
        </div>

        <div class="container-1">
            <div class="card">
                <div class="cards-1">
                    <div class="first-div">
                        <h3>Start your investment journey</h3>
                        <div>
                            <span>Got an account? <a href="login.html">Sign in</a></span>
                        </div>
                    </div>

                    <div class="second-div">
                        <div class="social">
                            <button onclick="googleSign()"><img src="IMAGES/google.svg" alt=""> Sign up with
                                Google</button>
                        </div>

                        <div class="divider">
                            <hr>
                            <span>or</span>
                            <hr>
                        </div>
                        <div class="input-type">
                            <input type="email" autofocus placeholder="Email Address" required id="inputEmail">
                            <div id="message"></div>
                        </div>

                        <div class="grids">
                            <div class="input-type">
                                <input type="text" autofocus placeholder="Legal Name" required id="legalName">
                                <div id="message"></div>
                            </div>
                            <div class="input-type">
                                <input type="text" autofocus placeholder="Legal Last Name" required id="legalLastName">
                                <div id="message"></div>
                            </div>
                            <div class="input-type">
                                <input type="text" autofocus placeholder="username" required id="userName">
                                <div id="message"></div>
                            </div>
                            <div class="input-type">
                                <input type="tel" autofocus placeholder="Phone Number" required id="phoneNumber">
                                <div id="message"></div>
                            </div>
                            <div class="input-type">
                                <input type="password" autofocus placeholder="Password" required id="inputPassword">
                                <span class="eye-icon" onclick="togglePasswordField('inputPassword', this)"><i
                                        class="fa-regular fa-eye"></i></span>
                                <div id="message"></div>
                            </div>
                            <div class="input-type">
                                <input type="password" autofocus placeholder="Confirm Password" required
                                    id="inputConfirmPassword">
                                <span class="eye-icon" onclick="togglePasswordField('inputConfirmPassword', this)"><i
                                        class="fa-regular fa-eye"></i></span>
                            </div>
                        </div>


                        <div class="btn">
                            <div id="errorMessage"
                                style="color: red; font-weight: 400; margin-bottom: 10px; display: none; text-align: start; opacity: 0.6;">
                            </div>
                            <button id="btn" onclick="createForm()">Continue</button>
                        </div>
                    </div>

                </div>
            </div>

            <div class="cards-2">
                <div class="sub-cards-2">
                    <h5>Don't wait to start</h5>
                    <p>See how much you could have earned in the past few years</p>
                </div>
                <a href="#">✨See what you missed <img src="IMAGES/signup-arrow.svg" alt=""></a>
            </div>
        </div>
        <div class="footer-links">
            <span><img src="IMAGES/signup-sec.png" alt="" width="5%"> Cowrywise is licensed by the SEC</span>

            <div>
                <a href="#">Need help?</a>
            </div>
        </div>

        <div class="bg-image">
            <img src="IMAGES/signup-bg.svg" alt="">
            <div class="img-logo"> <img src="IMAGES/logo-side.png" alt="" width="8%"
                    style="position: absolute; bottom: 20px; right: 20px; border-radius: 50%;"></div>
        </div>
    </div>
</body>
<script src="script.js"></script>
<script>
    function togglePasswordField(inputId, iconSpan) {
        const input = document.getElementById(inputId);
        const icon = iconSpan.querySelector('i');

        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>
<script type="module">
    // Import the functions you need from the SDKs you need
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    // TODO: Add SDKs for Firebase products that you want to use
    // https://firebase.google.com/docs/web/setup#available-libraries

    // Your web app's Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyAXrI6w4SUZSvQKwOLhEKQgBJP4_IIVG4U",
        authDomain: "project-cowrywise.firebaseapp.com",
        projectId: "project-cowrywise",
        storageBucket: "project-cowrywise.firebasestorage.app",
        messagingSenderId: "941775035575",
        appId: "1:941775035575:web:641bec9ad2778b5b214132"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const googleSign = () => {
        signInWithPopup(auth, provider)
            .then((result) => {
                const user = result.user;
                console.log(user);
                const fullName = user.displayName || '';
                const firstName = fullName.split(' ')[0];
                localStorage.setItem('loggedInUser', user.uid);
                localStorage.setItem('userData', JSON.stringify({
                    firstName: firstName,
                    email: user.email,
                    displayName: fullName
                }));
                setTimeout(() => {
                    window.location.href = 'pin.html';
                }, 1000);
            })
            .catch((error) => {
                const errorCode = error.code;
                const errorMessage = error.message;
                console.log(errorCode);
                console.log(errorMessage);
            })
    }
    
    window.googleSign = googleSign


    const createForm = () => {
        const email = document.getElementById('inputEmail').value;
        const userLegalName = document.getElementById('legalName').value;
        const userLegalLastName = document.getElementById('legalLastName').value;
        const userName = document.getElementById('userName').value;
        const userPhoneNumber = document.getElementById('phoneNumber').value;
        const userPassword = document.getElementById('inputPassword').value;
        const userConfirmPassword = document.getElementById('inputConfirmPassword').value;

        if (email === "" || userLegalName === "" || userLegalLastName === "" || userName === "" || userPhoneNumber === "" || userPassword === "" || userConfirmPassword === "") {
            alert('kindly fill the form')
        }
        createUserWithEmailAndPassword(auth, email, userPassword)
            .then((userCredential) => {
                const user = userCredential.user;
                console.log(userCredential);
                localStorage.setItem('loggedInUser', user.uid);
                localStorage.setItem('userData', JSON.stringify({
                    firstName: userLegalName,
                    lastName: userLegalLastName,
                    email: email,
                    username: userName,
                    phone: userPhoneNumber
                }));
                window.location.href = 'pin.html';
            })
            .catch((error) => {
                const errorCode = error.code;
                const errorMessage = error.message;
                console.log(errorCode);
                if (errorCode === 'auth/invalid-email') {
                    alert('Invalid Email')
                }
            });
    }


    window.createForm = createForm
</script>

</html>
